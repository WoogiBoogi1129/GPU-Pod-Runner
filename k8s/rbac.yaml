apiVersion: v1
kind: Namespace
metadata:
  name: ml-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-runner-sa
  namespace: ml-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gpu-runner-role
  namespace: ml-dev
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gpu-runner-rolebinding
  namespace: ml-dev
subjects:
  - kind: ServiceAccount
    name: gpu-runner-sa
    namespace: ml-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gpu-runner-role
