apiVersion: v1
kind: Secret
metadata:
  name: gpu-runner-code-server-auth
  namespace: ml-dev
type: Opaque
stringData:
  PASSWORD: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-runner-code-server
  namespace: ml-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-runner-code-server
  template:
    metadata:
      labels:
        app: gpu-runner-code-server
    spec:
      serviceAccountName: gpu-runner-ide
      containers:
        - name: code-server
          image: your-registry.example.com/gpu-runner-code-server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gpu-runner-code-server-auth
                  key: PASSWORD
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: shared-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-runner-code-server
  namespace: ml-dev
spec:
  selector:
    app: gpu-runner-code-server
  ports:
    - name: http
      port: 8080
      targetPort: http
